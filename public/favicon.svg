<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" fill="#0a0e1a" rx="6"/>
  <!-- Isometric brick icon -->
  <polygon points="16,4 28,10 28,18 16,24 4,18 4,10" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
  <polygon points="16,4 28,10 16,16 4,10" fill="#00d4ff" opacity="0.25"/>
  <polygon points="4,10 16,16 16,24 4,18" fill="#00d4ff" opacity="0.15"/>
  <polygon points="28,10 16,16 16,24 28,18" fill="#00d4ff" opacity="0.1"/>
  <!-- Inner brick lines -->
  <line x1="16" y1="16" x2="16" y2="24" stroke="#00d4ff" stroke-width="1" opacity="0.6"/>
  <line x1="16" y1="4" x2="16" y2="16" stroke="#00d4ff" stroke-width="1" opacity="0.6"/>
</svg>
